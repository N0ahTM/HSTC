version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - node -e "const fs=require('fs');const p='amplify_outputs.json';if(!fs.existsSync(p)){throw new Error('Missing amplify_outputs.json after backend deploy');}JSON.parse(fs.readFileSync(p,'utf8'));"
        - npm run build
    postBuild:
      commands:
        - npm run assets:sync
        - node scripts/apply-amplify-redirects.mjs
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
