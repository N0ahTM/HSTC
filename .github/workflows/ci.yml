name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-build-lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Lint infrastructure and scripts
        run: npm run lint:infra

      - name: Build
        run: npm run build

      - name: Lighthouse budget checks
        run: npm run perf:lighthouse
